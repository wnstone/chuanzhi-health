<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>健康评估 - 传智健康</title>
    <link rel="icon" href="../img/asset-favico.ico">
    <style>
        :root{
            --brand:#ff8a00; --brand-2:#ff6a00; --brand-soft:#fff4e6;
            --ink:#2b2b33; --sub:#9a9aa5; --bg:#f3f2f7; --card:#fff;
            --radius:16px; --shadow:0 6px 20px rgba(0,0,0,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,sans-serif;line-height:1.6}
        ul,li{list-style:none}
        .app{max-width:750px;margin:0 auto;min-height:100vh;overflow:hidden}
        .top-header{background:#1d1d22;color:#fff;height:45px;line-height:45px;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:20}
        .top-header .back{font-size:22px;cursor:pointer;width:30px}
        .top-header .title{flex:1;text-align:center;font-size:16px}
        .top-header .more{width:30px;text-align:right;letter-spacing:2px;font-size:18px}
        .hero{position:relative;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);color:#fff;padding:26px 20px 70px;overflow:hidden;text-align:center}
        .hero .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.1)}
        .hero .blob.b1{width:140px;height:140px;top:-46px;right:-24px}
        .hero .blob.b2{width:80px;height:80px;bottom:10px;left:-16px;background:rgba(255,255,255,.08)}
        .hero h1{font-size:23px;font-weight:600;position:relative}
        .hero p{font-size:13px;opacity:.9;margin-top:4px;position:relative}
        /* 健康分环 */
        .score-card{margin:-52px 16px 0;background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:22px;position:relative;z-index:5;display:flex;align-items:center}
        .ring{width:96px;height:96px;flex-shrink:0;position:relative}
        .ring svg{transform:rotate(-90deg)}
        .ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .ring .val b{font-size:26px;color:var(--brand)}
        .ring .val span{font-size:11px;color:var(--sub)}
        .score-info{margin-left:20px}
        .score-info h3{font-size:17px;font-weight:600}
        .score-info .tag{display:inline-block;font-size:11px;background:rgba(33,193,122,.12);color:#21c17a;padding:3px 10px;border-radius:12px;margin:6px 0}
        .score-info p{font-size:12px;color:var(--sub)}
        /* 评估分类 */
        .sec-title{padding:22px 18px 12px;font-size:15px;font-weight:600;display:flex;align-items:center}
        .sec-title::before{content:"";width:4px;height:15px;background:var(--brand);border-radius:2px;margin-right:8px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
        .cat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px;transition:transform .15s;cursor:pointer}
        .cat:active{transform:scale(.97)}
        .cat .c-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
        .cat h4{font-size:15px;font-weight:600}
        .cat p{font-size:12px;color:var(--sub);margin-top:2px}
        /* CTA */
        .cta{margin:24px 16px 30px}
        .cta button{width:100%;border:none;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;font-size:16px;font-weight:600;padding:15px;border-radius:26px;box-shadow:0 8px 20px rgba(255,122,0,.3);cursor:pointer;transition:transform .15s}
        .cta button:active{transform:scale(.98)}
        .fade{opacity:0;transform:translateY(16px);animation:up .5s forwards}
        @keyframes up{to{opacity:1;transform:none}}
        .d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.19s}.d4{animation-delay:.26s}
    </style>
</head>
<body>
<div class="app">
    <div class="top-header">
        <span class="back" onclick="history.go(-1)">‹</span>
        <span class="title">健康评估</span>
        <span class="more">···</span>
    </div>

    <div class="hero">
        <div class="blob b1"></div><div class="blob b2"></div>
        <h1>健康评估</h1>
        <p>科学评估,全面了解自身健康状况</p>
    </div>

    <div class="score-card fade">
        <div class="ring">
            <svg width="96" height="96"><circle cx="48" cy="48" r="42" stroke="#f0eff4" stroke-width="9" fill="none"/><circle cx="48" cy="48" r="42" stroke="#ff8a00" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="45"/></svg>
            <div class="val"><b>83</b><span>综合评分</span></div>
        </div>
        <div class="score-info">
            <h3>您的健康状况良好</h3>
            <span class="tag">● 健康等级:优</span>
            <p>基于最近一次体检数据综合评估</p>
        </div>
    </div>

    <div class="sec-title fade d1">专项评估</div>
    <div class="grid">
        <div class="cat fade d1">
            <div class="c-ico" style="background:rgba(255,107,107,.12)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3 1.3 6 4 3-2.7 4-4 6-4 3.5 0 5 4 3.5 7-2.5 4.5-9.5 9-9.5 9z" fill="#ff6b6b"/></svg></div>
            <h4>心血管评估</h4><p>血压 · 血脂 · 心率</p>
        </div>
        <div class="cat fade d2">
            <div class="c-ico" style="background:rgba(255,159,67,.14)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3c3 4 6 6.5 6 10a6 6 0 11-12 0c0-3.5 3-6 6-10z" fill="#ff9f43"/></svg></div>
            <h4>血糖评估</h4><p>糖尿病风险筛查</p>
        </div>
        <div class="cat fade d3">
            <div class="c-ico" style="background:rgba(18,183,245,.12)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 2v6l-3 3v9a2 2 0 002 2h8a2 2 0 002-2v-9l-3-3V2" stroke="#12b7f5" stroke-width="1.6" fill="none"/></svg></div>
            <h4>骨骼评估</h4><p>骨密度 · 关节健康</p>
        </div>
        <div class="cat fade d4">
            <div class="c-ico" style="background:rgba(33,193,122,.12)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#21c17a" stroke-width="1.6"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6" stroke="#21c17a" stroke-width="1.6"/></svg></div>
            <h4>营养评估</h4><p>膳食 · BMI 分析</p>
        </div>
    </div>

    <div class="cta fade d3">
        <button>开始新的健康评估</button>
    </div>
</div>
</body>
</html>
