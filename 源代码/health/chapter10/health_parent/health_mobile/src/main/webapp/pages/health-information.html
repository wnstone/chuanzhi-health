<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>健康咨询 - 传智健康</title>
    <link rel="icon" href="../img/asset-favico.ico">
    <style>
        :root{
            --brand:#ff8a00; --brand-2:#ff6a00; --brand-soft:#fff4e6;
            --ink:#2b2b33; --sub:#9a9aa5; --bg:#f3f2f7; --card:#fff;
            --radius:16px; --shadow:0 6px 20px rgba(0,0,0,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,sans-serif;line-height:1.6}
        ul,li{list-style:none}
        .app{max-width:750px;margin:0 auto;min-height:100vh;overflow:hidden}
        .top-header{background:#1d1d22;color:#fff;height:45px;line-height:45px;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:20}
        .top-header .back{font-size:22px;cursor:pointer;width:30px}
        .top-header .title{flex:1;text-align:center;font-size:16px}
        .top-header .more{width:30px;text-align:right;letter-spacing:2px;font-size:18px}
        .hero{position:relative;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);color:#fff;padding:26px 20px 40px;overflow:hidden}
        .hero .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.1)}
        .hero .blob.b1{width:140px;height:140px;top:-46px;right:-24px}
        .hero .blob.b2{width:80px;height:80px;bottom:-30px;left:-16px;background:rgba(255,255,255,.08)}
        .hero h1{font-size:23px;font-weight:600;position:relative}
        .hero p{font-size:13px;opacity:.9;margin-top:4px;position:relative}
        /* 分类标签 */
        .tabs{display:flex;gap:8px;padding:14px 16px 6px;overflow-x:auto;position:relative;z-index:5}
        .tabs::-webkit-scrollbar{display:none}
        .tab{white-space:nowrap;font-size:13px;padding:7px 16px;border-radius:18px;background:var(--card);color:var(--sub);box-shadow:var(--shadow);cursor:pointer;transition:.2s}
        .tab.on{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 4px 12px rgba(255,122,0,.3)}
        /* 头条 */
        .feature{margin:10px 16px 0;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:relative;height:150px;background:linear-gradient(120deg,#ffb347,#ff7a00);cursor:pointer}
        .feature .fc{position:absolute;inset:0;padding:18px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;background:linear-gradient(to top,rgba(0,0,0,.35),transparent 60%)}
        .feature .ftag{align-self:flex-start;font-size:11px;background:rgba(255,255,255,.25);padding:3px 10px;border-radius:12px;margin-bottom:8px;backdrop-filter:blur(4px)}
        .feature h2{font-size:18px;font-weight:600}
        .feature p{font-size:12px;opacity:.9}
        /* 资讯列表 */
        .sec-title{padding:20px 18px 10px;font-size:15px;font-weight:600;display:flex;align-items:center}
        .sec-title::before{content:"";width:4px;height:15px;background:var(--brand);border-radius:2px;margin-right:8px}
        .news{padding:0 16px 24px}
        .art{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;display:flex;transition:transform .15s;cursor:pointer}
        .art:active{transform:scale(.98)}
        .art .thumb{width:92px;height:70px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px}
        .art .a-main{flex:1;margin-left:14px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
        .art .a-main h4{font-size:15px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .art .a-meta{font-size:11px;color:var(--sub);display:flex;justify-content:space-between;margin-top:6px}
        .fade{opacity:0;transform:translateY(16px);animation:up .5s forwards}
        @keyframes up{to{opacity:1;transform:none}}
        .d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.19s}.d4{animation-delay:.26s}
    </style>
</head>
<body>
<div class="app">
    <div class="top-header">
        <span class="back" onclick="history.go(-1)">‹</span>
        <span class="title">健康咨询</span>
        <span class="more">···</span>
    </div>

    <div class="hero">
        <div class="blob b1"></div><div class="blob b2"></div>
        <h1>健康咨询</h1>
        <p>权威健康资讯 · 专家在线解读</p>
    </div>

    <div class="tabs">
        <span class="tab on">推荐</span>
        <span class="tab">养生保健</span>
        <span class="tab">饮食营养</span>
        <span class="tab">运动健身</span>
        <span class="tab">疾病预防</span>
    </div>

    <div class="feature fade">
        <div class="fc">
            <span class="ftag">🔥 热门头条</span>
            <h2>秋冬换季,如何科学提升免疫力?</h2>
            <p>三甲医院营养科主任为你详细讲解</p>
        </div>
    </div>

    <div class="sec-title fade d1">最新资讯</div>
    <div class="news">
        <div class="art fade d1">
            <div class="thumb" style="background:rgba(255,159,67,.14)">🥗</div>
            <div class="a-main">
                <h4>每天一把坚果,真的能护心血管吗?</h4>
                <div class="a-meta"><span>饮食营养</span><span>👁 3.2万 · 2天前</span></div>
            </div>
        </div>
        <div class="art fade d2">
            <div class="thumb" style="background:rgba(18,183,245,.12)">🏃</div>
            <div class="a-main">
                <h4>久坐族必看:每小时这样动一动,远离颈椎病</h4>
                <div class="a-meta"><span>运动健身</span><span>👁 2.8万 · 3天前</span></div>
            </div>
        </div>
        <div class="art fade d3">
            <div class="thumb" style="background:rgba(33,193,122,.12)">😴</div>
            <div class="a-main">
                <h4>睡不好毁一天?收好这份高质量睡眠指南</h4>
                <div class="a-meta"><span>养生保健</span><span>👁 5.1万 · 5天前</span></div>
            </div>
        </div>
        <div class="art fade d4">
            <div class="thumb" style="background:rgba(255,107,107,.12)">❤️</div>
            <div class="a-main">
                <h4>体检报告上的这几个箭头,到底要不要紧?</h4>
                <div class="a-meta"><span>疾病预防</span><span>👁 4.6万 · 1周前</span></div>
            </div>
        </div>
    </div>
</div>
<script>
    // 分类标签切换(纯前端演示交互)
    document.querySelectorAll('.tab').forEach(function(t){
        t.addEventListener('click', function(){
            document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});
            t.classList.add('on');
        });
    });
</script>
</body>
</html>
