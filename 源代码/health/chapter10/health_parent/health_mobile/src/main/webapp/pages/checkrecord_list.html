<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>报告查询 - 传智健康</title>
    <link rel="icon" href="../img/asset-favico.ico">
    <style>
        :root{
            --brand:#ff8a00; --brand-2:#ff6a00; --brand-soft:#fff4e6;
            --ink:#2b2b33; --sub:#9a9aa5; --bg:#f3f2f7; --card:#fff;
            --ok:#21c17a; --wait:#ff9f43; --radius:16px; --shadow:0 6px 20px rgba(0,0,0,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,sans-serif;line-height:1.6}
        ul,li{list-style:none}
        .app{max-width:750px;margin:0 auto;min-height:100vh;background:var(--bg);overflow:hidden}
        /* 顶栏:和首页统一的深色条 */
        .top-header{background:#1d1d22;color:#fff;height:45px;line-height:45px;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:20}
        .top-header .back{font-size:22px;cursor:pointer;width:30px}
        .top-header .title{flex:1;text-align:center;font-size:16px}
        .top-header .more{width:30px;text-align:right;letter-spacing:2px;font-size:18px}
        /* 橙色主视觉 */
        .hero{position:relative;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);color:#fff;padding:26px 20px 46px;overflow:hidden}
        .hero .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.12)}
        .hero .blob.b1{width:150px;height:150px;top:-50px;right:-30px}
        .hero .blob.b2{width:90px;height:90px;bottom:-30px;left:-20px;background:rgba(255,255,255,.08)}
        .hero .ico{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);margin-bottom:12px}
        .hero h1{font-size:23px;font-weight:600;position:relative}
        .hero p{font-size:13px;opacity:.9;margin-top:4px;position:relative}
        /* 搜索条 */
        .search-wrap{padding:0 16px;margin-top:-26px;position:relative;z-index:5}
        .search{background:var(--card);border-radius:26px;box-shadow:var(--shadow);display:flex;align-items:center;padding:11px 18px}
        .search svg{flex-shrink:0}
        .search input{border:none;outline:none;flex:1;margin-left:10px;font-size:14px;background:transparent;color:var(--ink)}
        /* 统计条 */
        .stats{display:flex;padding:16px;gap:12px}
        .stat{flex:1;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);text-align:center;padding:14px 6px}
        .stat .num{font-size:22px;font-weight:700;color:var(--brand)}
        .stat .lbl{font-size:12px;color:var(--sub);margin-top:2px}
        /* 报告列表 */
        .sec-title{padding:6px 18px 10px;font-size:15px;font-weight:600;display:flex;align-items:center}
        .sec-title::before{content:"";width:4px;height:15px;background:var(--brand);border-radius:2px;margin-right:8px}
        .list{padding:0 16px 30px}
        .rec{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;display:flex;align-items:center;transition:transform .15s,box-shadow .15s;cursor:pointer}
        .rec:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .rec .r-ico{width:46px;height:46px;border-radius:12px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .rec .r-main{flex:1;margin-left:14px;min-width:0}
        .rec .r-name{font-size:15px;font-weight:600}
        .rec .r-meta{font-size:12px;color:var(--sub);margin-top:2px}
        .rec .r-right{text-align:right;flex-shrink:0}
        .badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:500}
        .badge.ok{background:rgba(33,193,122,.12);color:var(--ok)}
        .badge.wait{background:rgba(255,159,67,.14);color:var(--wait)}
        .rec .arrow{color:#ccc;font-size:12px;margin-top:8px}
        /* 入场动画 */
        .fade{opacity:0;transform:translateY(16px);animation:up .5s forwards}
        @keyframes up{to{opacity:1;transform:none}}
        .d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.19s}.d4{animation-delay:.26s}.d5{animation-delay:.33s}
    </style>
</head>
<body>
<div class="app">
    <div class="top-header">
        <span class="back" onclick="history.go(-1)">‹</span>
        <span class="title">报告查询</span>
        <span class="more">···</span>
    </div>

    <div class="hero">
        <div class="blob b1"></div><div class="blob b2"></div>
        <div class="ico">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M9 2h6a2 2 0 012 2v0h1a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h1a2 2 0 012-2z" stroke="#fff" stroke-width="1.6"/><path d="M9 12h6M9 16h4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/><path d="M9 4h6" stroke="#fff" stroke-width="1.6"/></svg>
        </div>
        <h1>体检报告</h1>
        <p>一键查询您历次体检的详细报告</p>
    </div>

    <div class="search-wrap fade">
        <div class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#bbb" stroke-width="1.8"/><path d="M20 20l-3.5-3.5" stroke="#bbb" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input type="text" placeholder="搜索报告名称 / 体检日期">
        </div>
    </div>

    <div class="stats">
        <div class="stat fade d1"><div class="num">6</div><div class="lbl">历史报告</div></div>
        <div class="stat fade d2"><div class="num">5</div><div class="lbl">已出结果</div></div>
        <div class="stat fade d3"><div class="num">1</div><div class="lbl">待出结果</div></div>
    </div>

    <div class="sec-title fade d1">我的报告</div>
    <ul class="list">
        <li class="rec fade d1">
            <div class="r-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" stroke="#ff8a00" stroke-width="1.5"/><path d="M14 3v5h5" stroke="#ff8a00" stroke-width="1.5"/></svg></div>
            <div class="r-main"><div class="r-name">入职健康体检套餐</div><div class="r-meta">体检日期 2025-11-08 · 传智体检中心</div></div>
            <div class="r-right"><span class="badge ok">已出</span><div class="arrow">查看 ›</div></div>
        </li>
        <li class="rec fade d2">
            <div class="r-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" stroke="#ff8a00" stroke-width="1.5"/><path d="M14 3v5h5" stroke="#ff8a00" stroke-width="1.5"/></svg></div>
            <div class="r-main"><div class="r-name">中青年深度体检套餐</div><div class="r-meta">体检日期 2025-06-20 · 传智体检中心</div></div>
            <div class="r-right"><span class="badge ok">已出</span><div class="arrow">查看 ›</div></div>
        </li>
        <li class="rec fade d3">
            <div class="r-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" stroke="#ff8a00" stroke-width="1.5"/><path d="M14 3v5h5" stroke="#ff8a00" stroke-width="1.5"/></svg></div>
            <div class="r-main"><div class="r-name">女性专项健康筛查</div><div class="r-meta">体检日期 2024-12-15 · 传智体检中心</div></div>
            <div class="r-right"><span class="badge ok">已出</span><div class="arrow">查看 ›</div></div>
        </li>
        <li class="rec fade d4">
            <div class="r-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" stroke="#ff8a00" stroke-width="1.5"/><path d="M14 3v5h5" stroke="#ff8a00" stroke-width="1.5"/></svg></div>
            <div class="r-main"><div class="r-name">心脑血管专项检查</div><div class="r-meta">体检日期 2025-11-30 · 传智体检中心</div></div>
            <div class="r-right"><span class="badge wait">待出</span><div class="arrow">查看 ›</div></div>
        </li>
    </ul>
</div>
</body>
</html>
