<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>健康干预 - 传智健康</title>
    <link rel="icon" href="../img/asset-favico.ico">
    <style>
        :root{
            --brand:#ff8a00; --brand-2:#ff6a00; --brand-soft:#fff4e6;
            --ink:#2b2b33; --sub:#9a9aa5; --bg:#f3f2f7; --card:#fff;
            --radius:16px; --shadow:0 6px 20px rgba(0,0,0,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,sans-serif;line-height:1.6}
        ul,li{list-style:none}
        .app{max-width:750px;margin:0 auto;min-height:100vh;overflow:hidden}
        .top-header{background:#1d1d22;color:#fff;height:45px;line-height:45px;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:20}
        .top-header .back{font-size:22px;cursor:pointer;width:30px}
        .top-header .title{flex:1;text-align:center;font-size:16px}
        .top-header .more{width:30px;text-align:right;letter-spacing:2px;font-size:18px}
        .hero{position:relative;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);color:#fff;padding:26px 20px 44px;overflow:hidden}
        .hero .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.1)}
        .hero .blob.b1{width:140px;height:140px;top:-46px;right:-24px}
        .hero .blob.b2{width:80px;height:80px;bottom:-24px;left:-16px;background:rgba(255,255,255,.08)}
        .hero h1{font-size:23px;font-weight:600;position:relative}
        .hero p{font-size:13px;opacity:.9;margin-top:4px;position:relative}
        /* 今日进度卡 */
        .prog-card{margin:-24px 16px 0;background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:18px;position:relative;z-index:5}
        .prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .prog-top h3{font-size:15px;font-weight:600}
        .prog-top span{font-size:13px;color:var(--brand);font-weight:600}
        .bar{height:8px;background:#f0eff4;border-radius:6px;overflow:hidden}
        .bar i{display:block;height:100%;width:65%;background:linear-gradient(90deg,var(--brand),var(--brand-2));border-radius:6px}
        .prog-sub{font-size:12px;color:var(--sub);margin-top:8px}
        /* 干预方案 */
        .sec-title{padding:22px 18px 12px;font-size:15px;font-weight:600;display:flex;align-items:center}
        .sec-title::before{content:"";width:4px;height:15px;background:var(--brand);border-radius:2px;margin-right:8px}
        .plans{padding:0 16px 20px}
        .plan{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;display:flex;align-items:center;transition:transform .15s;cursor:pointer}
        .plan:active{transform:scale(.98)}
        .plan .p-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .plan .p-main{flex:1;margin-left:14px}
        .plan .p-main h4{font-size:15px;font-weight:600}
        .plan .p-main p{font-size:12px;color:var(--sub);margin-top:2px}
        .plan .p-tag{font-size:11px;padding:4px 10px;border-radius:12px;background:var(--brand-soft);color:var(--brand-2);font-weight:500;flex-shrink:0}
        .plan .p-tag.done{background:rgba(33,193,122,.12);color:#21c17a}
        .fade{opacity:0;transform:translateY(16px);animation:up .5s forwards}
        @keyframes up{to{opacity:1;transform:none}}
        .d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.19s}.d4{animation-delay:.26s}
    </style>
</head>
<body>
<div class="app">
    <div class="top-header">
        <span class="back" onclick="history.go(-1)">‹</span>
        <span class="title">健康干预</span>
        <span class="more">···</span>
    </div>

    <div class="hero">
        <div class="blob b1"></div><div class="blob b2"></div>
        <h1>健康干预</h1>
        <p>专属于您的个性化健康改善方案</p>
    </div>

    <div class="prog-card fade">
        <div class="prog-top">
            <h3>今日干预完成度</h3>
            <span>65%</span>
        </div>
        <div class="bar"><i></i></div>
        <p class="prog-sub">已完成 2 / 4 项 · 继续保持,健康就在坚持里</p>
    </div>

    <div class="sec-title fade d1">我的干预方案</div>
    <div class="plans">
        <div class="plan fade d1">
            <div class="p-ico" style="background:rgba(33,193,122,.12)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 21C7 17 4 13.5 4 9.5A4.5 4.5 0 0112 7a4.5 4.5 0 018 2.5c0 4-3 7.5-8 11.5z" stroke="#21c17a" stroke-width="1.5"/><path d="M12 8v5M9.5 10.5h5" stroke="#21c17a" stroke-width="1.5" stroke-linecap="round"/></svg></div>
            <div class="p-main"><h4>膳食营养干预</h4><p>低盐低脂 · 每日蔬果 500g</p></div>
            <span class="p-tag done">已完成</span>
        </div>
        <div class="plan fade d2">
            <div class="p-ico" style="background:rgba(18,183,245,.12)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2.4" stroke="#12b7f5" stroke-width="1.5"/><path d="M7 22l3-6 4 2 1 4M10 16l-1-5 5 1 3 3" stroke="#12b7f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="p-main"><h4>运动锻炼干预</h4><p>每日快走 30 分钟 · 步数 6000+</p></div>
            <span class="p-tag done">已完成</span>
        </div>
        <div class="plan fade d3">
            <div class="p-ico" style="background:rgba(155,109,255,.12)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 3a7 7 0 00-4 12.7V19a1 1 0 001 1h6a1 1 0 001-1v-3.3A7 7 0 0012 3z" stroke="#9b6dff" stroke-width="1.5"/><path d="M9 22h6" stroke="#9b6dff" stroke-width="1.5" stroke-linecap="round"/></svg></div>
            <div class="p-main"><h4>作息睡眠干预</h4><p>23 点前入睡 · 睡足 7 小时</p></div>
            <span class="p-tag">待完成</span>
        </div>
        <div class="plan fade d4">
            <div class="p-ico" style="background:rgba(255,159,67,.14)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#ff9f43" stroke-width="1.5"/><path d="M8.5 14c.8 1 2 1.6 3.5 1.6s2.7-.6 3.5-1.6M9 9.5h.01M15 9.5h.01" stroke="#ff9f43" stroke-width="1.6" stroke-linecap="round"/></svg></div>
            <div class="p-main"><h4>心理调节干预</h4><p>正念冥想 10 分钟 · 缓解压力</p></div>
            <span class="p-tag">待完成</span>
        </div>
    </div>
</div>
</body>
</html>
